<!DOCTYPE html>
<html>
<head>
  <title>Video Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔴 Adsterra Popunder Code START (HEAD এ বসাবে) -->
  <!-- 👉 Adsterra থেকে যে popunder script দিবে সেটা এখানে paste করো -->
  <!-- Example: -->
  <!-- <script src="YOUR-ADSTERRA-POPUNDER.js"></script> -->
  <!-- 🔴 Adsterra Popunder Code END -->

  <style>
    body{
      margin:0;
      background:#111;
      font-family:Arial;
      color:white;
    }

    header{
      background:#000;
      padding:15px;
      text-align:center;
      font-size:22px;
      color:#ff0066;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
      padding:10px;
    }

    .card{
      background:#1a1a1a;
      border-radius:8px;
      overflow:hidden;
      cursor:pointer;
    }

    .card img{
      width:100%;
    }

    .title{
      padding:8px;
      font-size:14px;
    }

    .ad{
      text-align:center;
      margin:10px;
    }

    .loader{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:999;
    }

    .loader h2{
      color:#ff0066;
    }
  </style>
</head>

<body>

<header>🔥 Video Hub</header>

<!-- 🟢 Adsterra Banner START -->
<div class="ad">
  <!-- 👉 Adsterra Banner Code এখানে paste করো -->
</div>
<!-- 🟢 Adsterra Banner END -->

<div class="grid">

  <!-- 🔵 CARD 1 -->
  <div class="card" onclick="redirect()">
    <img IMG_20260408_210416_507.jpg"> <!-- 👉 এখানে image link বসাও -->
    <div class="title">Trending Video</div>
  </div>

  <!-- 🔵 CARD 2 -->
  <div class="card" onclick="redirect()">
    <img src="IMG_20260408_210416_507.jpg"> <!-- 👉 এখানে image link বসাও -->
    <div class="title">New Clip</div>
  </div>

  <!-- 🔵 CARD 3 -->
  <div class="card" onclick="redirect()">
    <img src="IMG_20260408_210416_507.jpg"> <!-- 👉 এখানে image link বসাও -->
    <div class="title">Hot Content</div>
  </div>

  <!-- 🔵 CARD 4 -->
  <div class="card" onclick="redirect()">
    <img src="IMG_20260408_210416_507.jpg"> <!-- 👉 এখানে image link বসাও -->
    <div class="title">Exclusive</div>
  </div>

</div>

<!-- Loader -->
<div class="loader" id="loader">
  <h2>Loading...</h2>
  <p>Please wait 3 seconds</p>
</div>

<script>
function redirect(){
  document.getElementById("loader").style.display="flex";

  setTimeout(function(){
    window.location.href="https://www.facebook.com/profile.php?id=61588486546667"; // 🔴 👉 এখানে main redirect link বসাও
  }, 3000);
}
</script>

</body>
</html>
