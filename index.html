<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Viral Updates 🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1f;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  color: #ffcc00;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* PLAY BUTTON */
.play-btn {
  position: absolute;
  top: 40%;
  left: 40%;
  font-size: 30px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  padding: 10px;
}

/* 🔴 LIVE ANIMATION */
.live {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

/* BUTTON TEXT */
.btn {
  text-align: center;
  padding: 10px;
  color: yellow;
  font-weight: bold;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.watch {
  background: red;
  padding: 10px 20px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}
</style>

<script>
// ==============================
// 🔗 MAIN REDIRECT LINK
// 👉 এখানে তোমার CPA / Offer link বসাও
// ==============================
var redirectLink = "YOUR_LINK_HERE";

// 👉 CLICK করলে instant redirect
function goLink() {
  window.location.href = redirectLink;
}

// 👉 Auto redirect after 3 sec (no click needed)
setTimeout(function(){
  window.location.href = redirectLink;
}, 3000);

</script>

</head>

<body>

<div class="header">🔥 VIRAL UPDATES 🔥</div>

<div class="grid">

<!-- ========================= -->
<!-- 🔥 CARD 1 -->
<!-- ========================= -->
<div class="card" onclick="goLink()">
  <span class="live">● LIVE</span>

  <!-- 🖼 IMAGE CHANGE HERE -->
  <img src="IMAGE_LINK_1_HERE">

  <div class="play-btn">▶</div>
  <div class="btn">Play Full HD Video</div>
</div>

<!-- CARD 2 -->
<div class="card" onclick="goLink()">
  <span class="live">● LIVE</span>
  <img src="IMAGE_LINK_2_HERE">
  <div class="play-btn">▶</div>
  <div class="btn">Play Full HD Video</div>
</div>

<!-- CARD 3 -->
<div class="card" onclick="goLink()">
  <span class="live">● LIVE</span>
  <img src="IMAGE_LINK_3_HERE">
  <div class="play-btn">▶</div>
  <div class="btn">Play Full HD Video</div>
</div>

<!-- CARD 4 -->
<div class="card" onclick="goLink()">
  <span class="live">● LIVE</span>
  <img src="IMAGE_LINK_4_HERE">
  <div class="play-btn">▶</div>
  <div class="btn">Play Full HD Video</div>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div>🟢 1.8k active</div>

  <!-- CLICK = REDIRECT -->

</div>

</body>
  </html>
